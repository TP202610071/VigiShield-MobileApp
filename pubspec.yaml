name: vigishield_mobile_app
description: "VigiShield — Sistema Inteligente de Seguridad Doméstica"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP client
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.8.1

  # Camera access
  camera: ^0.11.1

  # Date & number formatting
  intl: ^0.20.2

  # Fonts
  google_fonts: ^6.2.1

  # Shimmer loading effects
  shimmer: ^3.0.0

  # Video player (HLS stream from MediaMTX).
  # media_kit (libmpv) — robust live HLS/RTSP playback. ExoPlayer (video_player)
  # falls behind MediaMTX's LL-HLS live window and stalls; libmpv handles it.
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_android_video: ^1.3.6
  media_kit_libs_ios_video: ^1.1.4

  # Keep screen on while watching the live stream
  wakelock_plus: ^1.2.10

  # Save screenshots to the device gallery
  gal: ^2.3.0

  # Deep links (open a specific event from a WhatsApp/notification link)
  app_links: ^6.3.2

  # Share event media (photo/clip) to other apps
  share_plus: ^10.1.4
  # Temp dir for downloading media before save/share
  path_provider: ^2.1.5

  # Pick photos for authorized-face registration
  image_picker: ^1.1.2

  # On-device face detection for the live biometric enrollment (guided scan)
  google_mlkit_face_detection: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# App launcher icon (shield logo). Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0A0F1E"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
